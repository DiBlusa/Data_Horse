<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Horse - Home</title>
    <style>
        :root {
            font-family: "Helvetica", Arial, sans-serif;
            background: linear-gradient(180deg, #eef5fb 0%, #ffffff 100%);
            color: #2c3e50;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #f0f5fb 0%, #eef2f7 100%);
        }

        .start-screen {
            width: min(460px, calc(100vw - 32px));
            padding: 40px 32px;
            text-align: center;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(44, 62, 80, 0.08);
        }

        .start-screen h1 {
            margin: 0 0 18px;
            font-size: 2.8rem;
            letter-spacing: -0.04em;
        }

        .start-screen p {
            margin: 0 0 28px;
            font-size: 1rem;
            line-height: 1.7;
            color: #506680;
        }

        .start-screen button {
            width: 100%;
            max-width: 280px;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            background: #3498db;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .start-screen button:hover {
            background: #2980b9;
            transform: translateY(-1px);
        }

        .start-screen .note {
            margin-top: 22px;
            font-size: 0.95rem;
            color: #7b8fa4;
        }
    </style>
</head>
<body>
    <main class="start-screen">
        <h1>🐴 Data Horse</h1>
        <p>Welcome to Data Horse. Press "Start" to go to the login screen and access the system.</p>
        <button type="button" onclick="window.location.href='/login.html'">Start</button>
        <p class="note">If you are using a static server, open the correct path to access the login page.</p>
    </main>
</body>
</html>
